logoutput: stderr

# start.sh will replace IFACE with the actual interface name
internal: 0.0.0.0 port = 1080
external: IFACE

clientmethod: none
socksmethod: none

user.notprivileged: nobody

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    command: bind connect udpassociate
    protocol: tcp udp
    log: error
}
